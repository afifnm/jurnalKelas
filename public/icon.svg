<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <rect width="512" height="512" rx="96" fill="#FACC15"/>
  <!-- Book icon (simplified) -->
  <g transform="translate(256,256)">
    <!-- Book body -->
    <rect x="-100" y="-130" width="180" height="220" rx="12" fill="white" opacity="0.95"/>
    <!-- Spine -->
    <rect x="-100" y="-130" width="28" height="220" rx="12" fill="#EAB308"/>
    <!-- Lines representing text -->
    <rect x="-52" y="-80" width="112" height="10" rx="5" fill="#94a3b8"/>
    <rect x="-52" y="-55" width="90" height="10" rx="5" fill="#94a3b8"/>
    <rect x="-52" y="-30" width="112" height="10" rx="5" fill="#94a3b8"/>
    <rect x="-52" y="-5" width="80" height="10" rx="5" fill="#94a3b8"/>
    <rect x="-52" y="20" width="112" height="10" rx="5" fill="#94a3b8"/>
    <rect x="-52" y="45" width="65" height="10" rx="5" fill="#94a3b8"/>
    <!-- Check mark badge -->
    <circle cx="60" cy="60" r="42" fill="#22c55e"/>
    <polyline points="40,60 56,76 82,46" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
